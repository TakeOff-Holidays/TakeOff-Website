<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="description" content="TakeOff Holidayz - Your complete travel partner offering premium holiday packages, flight bookings, hotel reservations, and personalized travel experiences across India and international destinations." />
    <meta name="keywords" content="travel agency, holiday packages, flight booking, hotel booking, Kerala tours, international travel, Dubai packages, Maldives vacation, Thailand tourism, travel planning, vacation packages" />
    <meta name="author" content="TakeOff Holidayz" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    <meta name="theme-color" content="#148dc4" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://takeoffholidayz.com/" />
    <meta property="og:title" content="TakeOff Holidayz - Your Complete Travel Partner" />
    <meta property="og:description" content="Discover amazing holiday packages, flight bookings, and personalized travel experiences with TakeOff Holidayz. Explore Kerala, Dubai, Maldives, and more!" />
    <meta property="og:image" content="https://takeoffholidayz.com/logoimg.png" />
    <meta property="og:site_name" content="TakeOff Holidayz" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://takeoffholidayz.com/" />
    <meta property="twitter:title" content="TakeOff Holidayz - Your Complete Travel Partner" />
    <meta property="twitter:description" content="Discover amazing holiday packages, flight bookings, and personalized travel experiences with TakeOff Holidayz." />
    <meta property="twitter:image" content="https://takeoffholidayz.com/logoimg.png" />

    <link rel="icon" href="/logoimg.png" />
    <link rel="canonical" href="https://takeoffholidayz.com/" />
    <title>TakeOff Holidayz - Your Complete Travel Partner | Holiday Packages & Flight Bookings</title>

    <!-- Preconnect to external domains for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@800&family=Afacad:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "TakeOff Holidayz",
      "description": "Your complete travel partner offering premium holiday packages, flight bookings, hotel reservations, and personalized travel experiences",
      "url": "https://takeoffholidayz.com",
      "logo": "https://takeoffholidayz.com/logoimg.png",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Kochi",
        "addressRegion": "Kerala",
        "addressCountry": "IN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+91-8129023279",
        "contactType": "customer service",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://www.facebook.com/takeoffholidayz",
        "https://www.instagram.com/takeoffholidayz"
      ],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Travel Packages",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "TravelPackage",
              "name": "Kerala Holiday Package",
              "description": "Experience God's Own Country with backwater cruises, Ayurvedic treatments, and spice plantation visits"
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "TravelPackage",
              "name": "Dubai Luxury Package",
              "description": "Explore Burj Khalifa, desert safaris, and luxury shopping in the Middle East"
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
